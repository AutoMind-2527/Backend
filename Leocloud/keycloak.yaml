---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-theme-automind
  namespace: student-if220129
data:
  theme.properties: |
    parent=keycloak
    import=common/keycloak
    styles=css/login.css
  login.css: |
    :root {
      --am-bg-start: #041024;
      --am-bg-end: #07162b;
      --am-card-bg: #1a1d2b;
      --am-text: #ffffff;
      --am-muted: #b9bfd4;
      --am-accent: #6c63ff;
      --am-accent-hover: #5a51ff;
      --am-border: #2a2f45;
    }

    body.login-pf {
      background: linear-gradient(180deg, var(--am-bg-start) 0%, var(--am-bg-end) 100%) !important;
      min-height: 100vh;
      color: var(--am-text);
      font-family: "Segoe UI", "Inter", Arial, sans-serif;
    }

    .login-pf body {
      background: linear-gradient(180deg, var(--am-bg-start) 0%, var(--am-bg-end) 100%) !important;
    }

    .login-pf-page {
      padding-top: 4rem;
    }

    .login-pf-page .card-pf,
    .login-pf-page .login-pf-page-header,
    .login-pf-page .login-pf-signup {
      background: var(--am-card-bg);
      border: 1px solid var(--am-border);
      border-radius: 14px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      color: var(--am-text);
    }

    .login-pf-page .card-pf {
      padding: 1.5rem 1.5rem 1rem;
    }

    .login-pf-page .login-pf-header h1,
    .login-pf-page h1,
    .login-pf-page h2,
    .login-pf-page h3,
    .login-pf-page label,
    .login-pf-page .control-label,
    .login-pf-page p,
    .login-pf-page span {
      color: var(--am-text) !important;
    }

    .login-pf-page a {
      color: var(--am-accent) !important;
    }

    .login-pf-page a:hover,
    .login-pf-page a:focus {
      color: var(--am-accent-hover) !important;
    }

    .login-pf-page .form-control {
      background: #111628;
      color: var(--am-text);
      border: 1px solid var(--am-border);
      border-radius: 10px;
      min-height: 42px;
    }

    .login-pf-page .form-control:focus {
      border-color: var(--am-accent);
      box-shadow: 0 0 0 0.2rem rgba(108, 99, 255, 0.2);
    }

    .login-pf-page .btn-primary,
    .login-pf-page .btn.btn-primary,
    .login-pf-page #kc-login,
    .login-pf-page #kc-register {
      background: var(--am-accent) !important;
      border: 1px solid var(--am-accent) !important;
      border-radius: 10px;
      color: #fff !important;
      font-weight: 600;
      min-height: 42px;
      transition: background 0.2s ease;
    }

    .login-pf-page .btn-primary:hover,
    .login-pf-page .btn-primary:focus,
    .login-pf-page #kc-login:hover,
    .login-pf-page #kc-register:hover {
      background: var(--am-accent-hover) !important;
      border-color: var(--am-accent-hover) !important;
    }

    .login-pf-page .checkbox label,
    .login-pf-page .help-block,
    .login-pf-page .kc-feedback-text {
      color: var(--am-muted) !important;
    }

    .login-pf-page .alert-error,
    .login-pf-page .alert-danger {
      border-radius: 10px;
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.15);
      color: #ffd5d5;
    }

    .login-pf-page .alert-success {
      border-radius: 10px;
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.15);
      color: #d0f9e0;
    }

    .login-pf-page .login-pf-signup {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
    }

    .login-pf-page .login-pf-brand {
      filter: brightness(1.1);
    }

